name: Release CI
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
        python-version:
          - 3.14
          - 3.14t
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.11.7"
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Syncing uv project
        shell: bash
        run: uv sync --all-extras --dev --no-install-project --python "$pythonLocation/bin/python"

      - name: Check Python ABI
        run: |
          if [[ "${{ matrix.python-version }}" == *t ]]; then
            uv run --no-sync python -c "import sys; assert not sys._is_gil_enabled()"
          else
            uv run --no-sync python -c "import sys; assert sys._is_gil_enabled()"
          fi

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i ${{ matrix.python-version }}
          sccache: 'true'
          manylinux: manylinux_2_28
          container: "ghcr.io/rust-cross/manylinux_2_28-cross:${{ matrix.platform.target }}"
          before-script-linux: |
            sudo apt-get update
            sudo apt-get install -y libopus-dev

      - name: Smoke test native wheel
        if: matrix.platform.target == 'x86_64'
        run: |
          uv run --no-sync python -m pip install --force-reinstall dist/*.whl
          if [[ "${{ matrix.python-version }}" == *t ]]; then export PYTHON_GIL=0; fi
          uv run --no-sync python -c "import asyncio, pyarrow as pa; asyncio.set_event_loop(asyncio.new_event_loop()); from discord.ext import songbird; from discord.ext.songbird import player; assert not hasattr(songbird, 'SupportedCodec'); player.AudioInput(pa.array([1, 2, 3], type=pa.uint8())); player.RawPCMInput(pa.array([0.0, 0.0], type=pa.float32()), sample_rate=48000, channels=2); player.StreamInput(asyncio.StreamReader()); player.OpusPacketInput(pa.array([b'\xf8\xff\xfe'], type=pa.binary())); player.OpusPacketStreamInput(max_packets=1); assert 'opus' in player.supported_codecs()"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}-${{ matrix.python-version }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: aarch64
        python-version:
          - 3.14
          - 3.14t
    steps:
      - uses: actions/checkout@v4

      - name: setup libopus
        run: |
          sudo apt-get update
          sudo apt-get install -y libopus-dev

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.11.7"
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Syncing uv project
        shell: bash
        run: uv sync --all-extras --dev --no-install-project --python "$pythonLocation/bin/python"

      - name: Check Python ABI
        run: |
          if [[ "${{ matrix.python-version }}" == *t ]]; then
            uv run --no-sync python -c "import sys; assert not sys._is_gil_enabled()"
          else
            uv run --no-sync python -c "import sys; assert sys._is_gil_enabled()"
          fi

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i ${{ matrix.python-version }}
          sccache: 'true'
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}-${{ matrix.python-version }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          - runner: windows-latest
            target: x86
        python-version:
          - 3.14
          - 3.14t
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.11.7"
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Syncing uv project
        shell: bash
        run: uv sync --all-extras --dev --no-install-project --python "$pythonLocation/python.exe"

      - name: Check Python ABI
        shell: bash
        run: |
          if [[ "${{ matrix.python-version }}" == *t ]]; then
            uv run --no-sync python -c "import sys; assert not sys._is_gil_enabled()"
          else
            uv run --no-sync python -c "import sys; assert sys._is_gil_enabled()"
          fi

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i ${{ matrix.python-version }} --features pyo3/generate-import-lib
          sccache: 'true'
      - name: Smoke test native wheel
        if: matrix.platform.target == 'x64'
        shell: bash
        run: |
          uv run --no-sync python -m pip install --force-reinstall dist/*.whl
          if [[ "${{ matrix.python-version }}" == *t ]]; then export PYTHON_GIL=0; fi
          uv run --no-sync python -c "import asyncio, pyarrow as pa; asyncio.set_event_loop(asyncio.new_event_loop()); from discord.ext import songbird; from discord.ext.songbird import player; assert not hasattr(songbird, 'SupportedCodec'); player.AudioInput(pa.array([1, 2, 3], type=pa.uint8())); player.RawPCMInput(pa.array([0.0, 0.0], type=pa.float32()), sample_rate=48000, channels=2); player.StreamInput(asyncio.StreamReader()); player.OpusPacketInput(pa.array([b'\xf8\xff\xfe'], type=pa.binary())); player.OpusPacketStreamInput(max_packets=1); assert 'opus' in player.supported_codecs()"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}-${{ matrix.python-version }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-14
            target: aarch64
        python-version:
          - 3.14
          - 3.14t
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install-bundler-gems

      - name: Install opus
        run: brew install opus pkg-config

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.11.7"
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Syncing uv project
        run: uv sync --all-extras --dev --no-install-project --python "$pythonLocation/bin/python"

      - name: Check Python ABI
        run: |
          if [[ "${{ matrix.python-version }}" == *t ]]; then
            uv run --no-sync python -c "import sys; assert not sys._is_gil_enabled()"
          else
            uv run --no-sync python -c "import sys; assert sys._is_gil_enabled()"
          fi

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i ${{ matrix.python-version }} --features pyo3/generate-import-lib
          sccache: 'true'
      - name: Smoke test native wheel
        run: |
          uv run --no-sync python -m pip install --force-reinstall dist/*.whl
          if [[ "${{ matrix.python-version }}" == *t ]]; then export PYTHON_GIL=0; fi
          uv run --no-sync python -c "import asyncio, pyarrow as pa; asyncio.set_event_loop(asyncio.new_event_loop()); from discord.ext import songbird; from discord.ext.songbird import player; assert not hasattr(songbird, 'SupportedCodec'); player.AudioInput(pa.array([1, 2, 3], type=pa.uint8())); player.RawPCMInput(pa.array([0.0, 0.0], type=pa.float32()), sample_rate=48000, channels=2); player.StreamInput(asyncio.StreamReader()); player.OpusPacketInput(pa.array([b'\xf8\xff\xfe'], type=pa.binary())); player.OpusPacketStreamInput(max_packets=1); assert 'opus' in player.supported_codecs()"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}-${{ matrix.python-version }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.11.7"
          python-version: "3.14"
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Syncing uv project
        run: uv sync --all-extras --dev --no-install-project --python "$pythonLocation/bin/python"
      - name: Test sdist
        run: |
          uv run --no-sync python -m pip install dist/*.tar.gz
      - name: Test sdist minimal codec build
        run: |
          uv run --no-sync python -m pip install --force-reinstall dist/*.tar.gz --config-settings="maturin.build-args=--no-default-features --features codec-minimal"
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, musllinux, windows, macos, sdist]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'wheels-*/*'

      - name: Publish to Test PyPI
        if: "github.event_name == 'workflow_dispatch'"
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
        with:
          command: upload
          args: --repository=testpypi --non-interactive --skip-existing wheels-*/*

      - name: Publish to PyPI
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
